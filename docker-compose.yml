services:
  postgres:
    image: postgres:16-alpine
    container_name: openchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openchat}
      POSTGRES_USER: ${POSTGRES_USER:-openchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openchat_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openchat} -d ${POSTGRES_DB:-openchat}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
